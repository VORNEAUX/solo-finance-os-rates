name: Update exchange rates

on:
  schedule:
    # Runs every day at 06:00 UTC. Frankfurter publishes new ECB rates on
    # business days, so weekends/holidays will simply keep the last value.
    - cron: '0 6 * * *'
  # Lets you trigger it manually from the Actions tab (e.g. right after setup,
  # to confirm everything works without waiting for the schedule).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest rates from Frankfurter (ECB)
        run: |
          curl -fSL "https://api.frankfurter.dev/v1/latest?from=USD&to=EUR,GBP,CAD,AUD,CHF,JPY,BRL" -o rates.json
          echo "Fetched:"
          cat rates.json

          # Garantisce che il file sia JSON valido con la chiave "rates"
          # prima di committarlo: se l'API cambia di nuovo o va in errore,
          # il job fallisce in modo visibile invece di pubblicare dati rotti.
          jq -e '.rates' rates.json > /dev/null

      - name: Commit updated rates.json (if changed)
        run: |
          git config user.name "rates-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rates.json
          git diff --cached --quiet || git commit -m "Update exchange rates"
          git push
